steps:
  # --- Step 1: Build the Docker image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bigtable-utils/java-worker:latest'
      - '.'

  # --- Step 2: Push the Docker image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bigtable-utils/java-worker:latest'

# Store the images in the build history
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bigtable-utils/java-worker:latest'